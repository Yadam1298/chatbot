<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar styling for better aesthetics */
        #chat-history::-webkit-scrollbar {
            width: 8px;
        }
        #chat-history::-webkit-scrollbar-thumb {
            background-color: #cbd5e1; /* slate-300 */
            border-radius: 4px;
        }
        #chat-history::-webkit-scrollbar-track {
            background: #f1f5f9; /* slate-100 */
        }
        /* Style for the typing indicator animation */
        .dot {
            width: 8px;
            height: 8px;
            background-color: #64748b; /* slate-500 */
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 font-sans">

    <!-- Chat Container -->
    <div id="chat-container" class="bg-white shadow-2xl rounded-xl w-full max-w-lg flex flex-col h-[80vh] overflow-hidden transition-shadow">

        <!-- Header -->
        <header class="p-4 bg-indigo-600 text-white shadow-md">
            <h1 class="text-xl font-bold">Llama Chatbot</h1>
            <p class="text-sm opacity-90">Powered by Flask & Hugging Face</p>
        </header>

        <!-- Chat History Area -->
        <main id="chat-history" class="flex-grow p-4 space-y-4 overflow-y-auto">
            <!-- Initial Greeting Message -->
            <div class="flex justify-start">
                <div class="bg-indigo-100 text-indigo-800 p-3 rounded-xl rounded-tl-none max-w-[80%] shadow-sm">
                    Hello! I'm ready to answer your questions. Try asking about geography or general knowledge!
                </div>
            </div>

            <!-- Messages will be injected here by JavaScript -->

            <!-- Loading Indicator (Hidden initially) -->
            <div id="loading-indicator" class="flex justify-start hidden">
                <div class="bg-gray-200 text-gray-700 p-3 rounded-xl rounded-tl-none max-w-[80%] shadow-sm">
                    <div class="flex items-center space-x-1">
                        <span class="text-sm font-medium">Thinking</span>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="p-4 border-t border-gray-200 bg-white flex items-center">
            <input type="text" id="user-input" placeholder="Type your message..."
                   class="flex-grow p-3 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors"
                   aria-label="User input message">
            <button id="send-button"
                    class="px-5 py-3 bg-indigo-600 text-white font-semibold rounded-r-lg hover:bg-indigo-700 disabled:bg-indigo-400 transition-colors shadow-md hover:shadow-lg">
                Send
            </button>
        </footer>

    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const loadingIndicator = document.getElementById('loading-indicator');
        const API_ENDPOINT = 'http://127.0.0.1:5000/chat';

        // Function to scroll chat history to the bottom
        const scrollToBottom = () => {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        };

        // Function to add a message to the chat history
        const addMessage = (content, isUser) => {
            const messageWrapper = document.createElement('div');
            messageWrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

            const messageBubble = document.createElement('div');
            messageBubble.className = `p-3 rounded-xl max-w-[80%] shadow-sm transition-all duration-300 ease-in-out ${
                isUser
                    ? 'bg-indigo-600 text-white rounded-br-none'
                    : 'bg-indigo-100 text-indigo-800 rounded-tl-none'
            }`;
            messageBubble.innerHTML = content.trim().replace(/\n/g, '<br>'); // Handle newlines
            messageWrapper.appendChild(messageBubble);
            chatHistory.appendChild(messageWrapper);
            scrollToBottom();
        };

        // Function to send the message to the Flask backend
        const sendMessage = async () => {
            const message = userInput.value.trim();
            if (message === '') return;

            // 1. Display user message
            addMessage(message, true);
            userInput.value = ''; // Clear input

            // 2. Show loading indicator
            loadingIndicator.classList.remove('hidden');
            sendButton.disabled = true;
            userInput.disabled = true;
            scrollToBottom();

            try {
                // 3. API Call to Flask backend
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ content: message }),
                });

                // 4. Handle response
                const data = await response.json();

                // 5. Hide loading indicator and enable controls
                loadingIndicator.classList.add('hidden');
                sendButton.disabled = false;
                userInput.disabled = false;

                if (response.ok) {
                    // Display AI response
                    addMessage(data.response || "I didn't receive a clear response.", false);
                } else {
                    // Display API error message
                    const errorMsg = data.error || `Error: Status ${response.status}. See console for details.`;
                    addMessage(`❌ System Error: ${errorMsg}`, false);
                    console.error('Backend API Error:', data);
                }

            } catch (error) {
                // 6. Handle network/fetch errors
                loadingIndicator.classList.add('hidden');
                sendButton.disabled = false;
                userInput.disabled = false;
                addMessage(`🔴 Network Error: Could not connect to backend at ${API_ENDPOINT}. Is your Flask server running?`, false);
                console.error('Fetch Error:', error);
            }

            userInput.focus(); // Keep focus on input for quick follow-up
        };

        // Event Listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });

        // Focus on input when the page loads
        window.onload = () => {
            userInput.focus();
        };
    </script>
</body>
</html>
